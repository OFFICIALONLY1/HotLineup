<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HotLineup</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
    }

    header {
      background: #1b1b1b;
      padding: 18px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #ff3b3b;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 32px;
      font-weight: bold;
      color: #ff3b3b;
    }

    .upload-section {
      background: #181818;
      padding: 30px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    .upload-section h2 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    .upload-section input[type="text"] {
      width: 300px;
      max-width: 90%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 10px;
      background: #2b2b2b;
      color: white;
      font-size: 16px;
    }

    .upload-section input[type="file"] {
      margin-bottom: 20px;
      color: white;
    }

    .upload-section button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #ff3b3b;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .upload-section button:hover {
      background: #ff1a1a;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 25px;
      padding: 30px;
    }

    .video-card {
      background: #1c1c1c;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .video-card:hover {
      transform: scale(1.02);
    }

    video {
      width: 100%;
      height: 220px;
      background: black;
      object-fit: cover;
    }

    .video-info {
      padding: 15px;
    }

    .video-title {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .video-file {
      color: #999;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      border-top: 1px solid #333;
      margin-top: 20px;
    }

    .warning {
      background: #252525;
      color: #ffb347;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      border-bottom: 1px solid #444;
    }
  </style>
</head>
<body>

  <div class="warning">
    18+ Website • Upload only content you own and have permission to share.
  </div>

  <header>
    <div class="logo">HotLineup</div>
    <div>Upload & Watch Videos</div>
  </header>

  <section class="upload-section">
    <h2>Upload Video</h2>

    <input type="text" id="titleInput" placeholder="Enter video title" />
    <br>

    <input type="file" id="videoInput" accept="video/*" />
    <br>

    <button onclick="uploadVideo()">Upload</button>
  </section>

  <section class="video-grid" id="videoGrid">
  </section>

  <footer>
    HotLineup & The Static Boys © 2026
  </footer>

  <script>
    function uploadVideo() {
      const titleInput = document.getElementById('titleInput');
      const videoInput = document.getElementById('videoInput');
      const videoGrid = document.getElementById('videoGrid');

      const file = videoInput.files[0];
      const title = titleInput.value.trim();

      if (!file) {
        alert('Please select a video file.');
        return;
      }

      const videoURL = URL.createObjectURL(file);

      const card = document.createElement('div');
      card.className = 'video-card';

      card.innerHTML = `
        <video controls>
          <source src="${videoURL}" type="${file.type}">
          Your browser does not support the video tag.
        </video>

        <div class="video-info">
          <div class="video-title">${title || 'Untitled Video'}</div>
          <div class="video-file">${file.name}</div>
        </div>
      `;

      videoGrid.prepend(card);

      titleInput.value = '';
      videoInput.value = '';
    }
  </script>

</body>
</html>
